id: nt8.playback
track: nt8-foundations
title: Playback and Market Replay
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to distinguish Replay101, Sim101, historical, and synchronous Playback.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- nt8.strategy-analyzer
tags:
- executable
- paper-only
- latency
translations:
  en:
    title: Playback and Market Replay
    summary: Implement and prove how to distinguish Replay101, Sim101, historical, and synchronous Playback.
  es:
    title: Playback y Market Replay
    summary: Implementa y demuestra cómo distinguir Replay101, Sim101, histórico y Playback síncrono.
hints:
- Read the visible assertion, then identify how to distinguish Replay101, Sim101, historical, and synchronous
  Playback; inspect `validate_playback_semantics` as a naming clue.
- The target behavior is represented by one explicit operation near `validate_playback_semantics`.
- Replay the latency profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - latency
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `validate_playback_semantics`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.latency.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded latency scenario.
