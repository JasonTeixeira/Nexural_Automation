objectives:
- Explain how to align bars and events to an explicit exchange calendar.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- research.data-contracts
tags:
- executable
- paper-only
- stale_data
translations:
  en:
    title: Session Normalization
    summary: Implement and prove how to align bars and events to an explicit exchange calendar.
  es:
    title: Normalización de sesiones
    summary: Implementa y demuestra cómo alinear barras y eventos a un calendario de mercado explícito.
hints:
- Read the visible assertion, then identify how to align bars and events to an explicit exchange calendar;
  inspect `normalize_session_calendar` as a naming clue.
- The target behavior is represented by one explicit operation near `normalize_session_calendar`.
- Replay the stale_data profile and inspect its required recovery operation.
execution:
