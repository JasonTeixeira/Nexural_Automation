id: nt8.contract-rollover
track: nt8-foundations
title: Contract Rollover Policy
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to make merge and rollover assumptions explicit and reproducible.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- nt8.timezones-dst
tags:
- executable
- paper-only
- stale_data
translations:
  en:
    title: Contract Rollover Policy
    summary: Implement and prove how to make merge and rollover assumptions explicit and reproducible.
  es:
    title: Política de rollover de contratos
    summary: Implementa y demuestra cómo hacer explícitos y reproducibles los supuestos de unión y rollover.
hints:
- Read the visible assertion, then identify how to make merge and rollover assumptions explicit and reproducible;
  inspect `apply_rollover_policy` as a naming clue.
- The target behavior is represented by one explicit operation near `apply_rollover_policy`.
- Replay the stale_data profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - stale_data
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `apply_rollover_policy`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.stale_data.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded stale_data scenario.
