id: bridge.stale-signals
track: bridge-engineer
title: Stale Signal Rejection
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to reject intent beyond its event-time validity window.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- bridge.ack-protocol
tags:
- executable
- paper-only
- stale_data
translations:
  en:
    title: Stale Signal Rejection
    summary: Implement and prove how to reject intent beyond its event-time validity window.
  es:
    title: Rechazo de señales obsoletas
    summary: Implementa y demuestra cómo rechazar intención fuera de su ventana temporal.
hints:
- Read the visible assertion, then identify how to reject intent beyond its event-time validity window;
  inspect `reject_expired_signal` as a naming clue.
- The target behavior is represented by one explicit operation near `reject_expired_signal`.
- Replay the stale_data profile and inspect its required recovery operation.
execution:
