id: strategy.multi-instrument
track: strategy-builder
title: Multi-Instrument Isolation
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to prevent state and order crossover between instruments.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- strategy.partial-fills
tags:
- executable
- paper-only
- duplicate
translations:
  en:
    title: Multi-Instrument Isolation
    summary: Implement and prove how to prevent state and order crossover between instruments.
  es:
    title: Aislamiento multiinstrumento
    summary: Implementa y demuestra cómo evitar cruces de estado y órdenes entre instrumentos.
hints:
- Read the visible assertion, then identify how to prevent state and order crossover between instruments;
  inspect `isolate_instrument_state` as a naming clue.
- The target behavior is represented by one explicit operation near `isolate_instrument_state`.
- Replay the duplicate profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - duplicate
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `isolate_instrument_state`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.duplicate.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded duplicate scenario.
