id: research.data-contracts
track: research-operator
title: Market Data Contracts
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to reject malformed schemas and impossible timestamps before analysis.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- research.reproducible-seeds
tags:
- executable
- paper-only
- stale_data
translations:
  en:
    title: Market Data Contracts
    summary: Implement and prove how to reject malformed schemas and impossible timestamps before analysis.
  es:
    title: Contratos de datos de mercado
    summary: Implementa y demuestra cómo rechazar esquemas inválidos y tiempos imposibles antes del análisis.
hints:
- Read the visible assertion, then identify how to reject malformed schemas and impossible timestamps
  before analysis; inspect `validate_data_contract` as a naming clue.
- The target behavior is represented by one explicit operation near `validate_data_contract`.
- Replay the stale_data profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - stale_data
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `validate_data_contract`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.stale_data.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded stale_data scenario.
