id: strategy.paper-deployment
track: strategy-builder
title: Paper Deployment Gate
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to promote only a reproducible Playback-tested build.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- strategy.risk-limits
tags:
- executable
- paper-only
- disconnect
translations:
  en:
    title: Paper Deployment Gate
    summary: Implement and prove how to promote only a reproducible Playback-tested build.
  es:
    title: Puerta de despliegue simulado
    summary: Implementa y demuestra cómo promover solo una versión reproducible probada en Playback.
hints:
- Read the visible assertion, then identify how to promote only a reproducible Playback-tested build;
  inspect `verify_paper_deployment_gate` as a naming clue.
- The target behavior is represented by one explicit operation near `verify_paper_deployment_gate`.
- Replay the disconnect profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - disconnect
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `verify_paper_deployment_gate`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.disconnect.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded disconnect scenario.
