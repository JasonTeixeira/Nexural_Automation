id: agent.timeout-budget
track: agent-automation-engineer
title: Timeout and Budget Control
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to stop safely at explicit time, token, and retry limits.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- agent.deterministic-plans
tags:
- executable
- paper-only
- latency
translations:
  en:
    title: Timeout and Budget Control
    summary: Implement and prove how to stop safely at explicit time, token, and retry limits.
  es:
    title: Control de tiempo y presupuesto
    summary: Implementa y demuestra cómo detener con seguridad en límites explícitos.
hints:
- Read the visible assertion, then identify how to stop safely at explicit time, token, and retry limits;
  inspect `enforce_execution_budget` as a naming clue.
- The target behavior is represented by one explicit operation near `enforce_execution_budget`.
- Replay the latency profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - latency
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `enforce_execution_budget`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.latency.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded latency scenario.
