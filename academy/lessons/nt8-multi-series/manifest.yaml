id: nt8.multi-series
track: nt8-foundations
title: Multi-Series Synchronization
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to guard BarsInProgress and CurrentBars before cross-series access.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- nt8.historical-transition
tags:
- executable
- paper-only
- stale_data
translations:
  en:
    title: Multi-Series Synchronization
    summary: Implement and prove how to guard BarsInProgress and CurrentBars before cross-series access.
  es:
    title: Sincronización multiserie
    summary: Implementa y demuestra cómo proteger BarsInProgress y CurrentBars antes del acceso entre
      series.
hints:
- Read the visible assertion, then identify how to guard BarsInProgress and CurrentBars before cross-series
  access; inspect `guard_bars_in_progress` as a naming clue.
- The target behavior is represented by one explicit operation near `guard_bars_in_progress`.
- Replay the stale_data profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - stale_data
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `guard_bars_in_progress`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.stale_data.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded stale_data scenario.
