id: nt8.historical-transition
track: nt8-foundations
title: Historical to Realtime Transition
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to separate historical, transition, and realtime behavior.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- nt8.calculate-modes
tags:
- executable
- paper-only
- duplicate
translations:
  en:
    title: Historical to Realtime Transition
    summary: Implement and prove how to separate historical, transition, and realtime behavior.
  es:
    title: Transición de histórico a tiempo real
    summary: Implementa y demuestra cómo separar el comportamiento histórico, de transición y en tiempo
      real.
hints:
- Read the visible assertion, then identify how to separate historical, transition, and realtime behavior;
  inspect `separate_historical_realtime` as a naming clue.
- The target behavior is represented by one explicit operation near `separate_historical_realtime`.
- Replay the duplicate profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - duplicate
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `separate_historical_realtime`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.duplicate.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded duplicate scenario.
