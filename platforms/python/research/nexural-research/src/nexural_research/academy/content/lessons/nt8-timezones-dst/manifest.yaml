id: nt8.timezones-dst
track: nt8-foundations
title: Trading Hours, Time Zones, and DST
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to normalize timestamps using the instrument trading-hours template.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- nt8.session-boundaries
tags:
- executable
- paper-only
- stale_data
translations:
  en:
    title: Trading Hours, Time Zones, and DST
    summary: Implement and prove how to normalize timestamps using the instrument trading-hours template.
  es:
    title: Horarios, zonas horarias y DST
    summary: Implementa y demuestra cómo normalizar marcas temporales con la plantilla horaria del instrumento.
hints:
- Read the visible assertion, then identify how to normalize timestamps using the instrument trading-hours
  template; inspect `normalize_exchange_timezone` as a naming clue.
- The target behavior is represented by one explicit operation near `normalize_exchange_timezone`.
- Replay the stale_data profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
