id: bridge.kill_switch
track: bridge-engineer
title: Persistent Kill Switch
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to fail closed across process and machine restart.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- bridge.reconciliation
tags:
- executable
- paper-only
- disconnect
translations:
  en:
    title: Persistent Kill Switch
    summary: Implement and prove how to fail closed across process and machine restart.
  es:
    title: Kill switch persistente
    summary: Implementa y demuestra cómo cerrar de forma segura entre reinicios.
hints:
- Read the visible assertion, then identify how to fail closed across process and machine restart; inspect
  `persist_kill_switch` as a naming clue.
- The target behavior is represented by one explicit operation near `persist_kill_switch`.
- Replay the disconnect profile and inspect its required recovery operation.
execution:
