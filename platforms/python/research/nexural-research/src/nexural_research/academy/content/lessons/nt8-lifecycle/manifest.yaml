id: nt8.lifecycle
track: nt8-foundations
title: NinjaScript State Lifecycle
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to configure state-specific resources without lifecycle leakage.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites: []
tags:
- executable
- paper-only
- disconnect
translations:
  en:
    title: NinjaScript State Lifecycle
    summary: Implement and prove how to configure state-specific resources without lifecycle leakage.
  es:
    title: Ciclo de estados de NinjaScript
    summary: Implementa y demuestra cómo configurar recursos por estado sin fugas de ciclo de vida.
hints:
- Read the visible assertion, then identify how to configure state-specific resources without lifecycle
  leakage; inspect `configure_state_lifecycle` as a naming clue.
- The target behavior is represented by one explicit operation near `configure_state_lifecycle`.
- Replay the disconnect profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - disconnect
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `configure_state_lifecycle`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.disconnect.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded disconnect scenario.
