id: strategy.state-machine
track: strategy-builder
title: Deterministic Strategy State
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to make every allowed strategy transition explicit.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- strategy.idempotency
tags:
- executable
- paper-only
- disconnect
translations:
  en:
    title: Deterministic Strategy State
    summary: Implement and prove how to make every allowed strategy transition explicit.
  es:
    title: Estado determinista de estrategia
    summary: Implementa y demuestra cómo hacer explícita cada transición permitida.
hints:
- Read the visible assertion, then identify how to make every allowed strategy transition explicit; inspect
  `transition_strategy_state` as a naming clue.
- The target behavior is represented by one explicit operation near `transition_strategy_state`.
- Replay the disconnect profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - disconnect
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `transition_strategy_state`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.disconnect.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded disconnect scenario.
