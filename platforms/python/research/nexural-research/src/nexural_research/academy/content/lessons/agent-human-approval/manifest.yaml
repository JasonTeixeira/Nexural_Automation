id: agent.human-approval
track: agent-automation-engineer
title: Human Approval Gates
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to pause before consequential external state changes.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- agent.tool-allowlists
tags:
- executable
- paper-only
- latency
translations:
  en:
    title: Human Approval Gates
    summary: Implement and prove how to pause before consequential external state changes.
  es:
    title: Puertas de aprobación humana
    summary: Implementa y demuestra cómo pausar antes de cambios externos importantes.
hints:
- Read the visible assertion, then identify how to pause before consequential external state changes;
  inspect `require_human_approval` as a naming clue.
- The target behavior is represented by one explicit operation near `require_human_approval`.
- Replay the latency profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - latency
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `require_human_approval`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.latency.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded latency scenario.
