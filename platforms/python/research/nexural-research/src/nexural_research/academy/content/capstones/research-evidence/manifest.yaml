id: capstone.research_evidence
track: research-operator
title: Defensible Research Evidence
updated_at: '2026-07-19'
estimated_minutes: 180
objectives:
- Integrate the terminal track behaviors into one deterministic replay.
- Produce a tamper-evident evidence bundle across all five incident profiles.
prerequisites:
- research.lookahead
- research.walk_forward
- research.cost_stress
- research.reproducible-seeds
- research.data-contracts
- research.session-normalization
- research.execution-matching
- research.bootstrap
- research.regime-segmentation
- research.optimization-bias
- research.monte-carlo
- research.evidence-bundles
tags:
- executable
- capstone
- paper-only
- incident-replay
translations:
  en:
    title: Defensible Research Evidence
    summary: Integrate the track in a deterministic incident replay.
  es:
    title: Evidencia de investigación defendible
    summary: Integra el itinerario en una repetición determinista de incidentes.
hints:
- Start with the final three track operations in curriculum order.
- Every fault profile requires a distinct recovery operation.
- Keep mode paper and seal the final evidence bundle.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - disconnect
  - duplicate
  - latency
  - partial_fill
  - stale_data
