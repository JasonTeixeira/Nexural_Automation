id: strategy.idempotency
track: strategy-builder
title: Signal Idempotency
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to turn repeated signals into one paper intent.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- strategy.regime
tags:
- executable
- paper-only
- duplicate
translations:
  en:
    title: Signal Idempotency
    summary: Implement and prove how to turn repeated signals into one paper intent.
  es:
    title: Idempotencia de señales
    summary: Implementa y demuestra cómo convertir señales repetidas en una sola intención simulada.
hints:
- Read the visible assertion, then identify how to turn repeated signals into one paper intent; inspect
  `deduplicate_signal_intent` as a naming clue.
- The target behavior is represented by one explicit operation near `deduplicate_signal_intent`.
- Replay the duplicate profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - duplicate
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `deduplicate_signal_intent`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.duplicate.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded duplicate scenario.
