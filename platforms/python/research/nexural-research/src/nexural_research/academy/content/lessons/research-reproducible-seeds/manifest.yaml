id: research.reproducible-seeds
track: research-operator
title: Reproducible Randomness
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to make stochastic evidence exactly replayable.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- research.cost_stress
tags:
- executable
- paper-only
- latency
translations:
  en:
    title: Reproducible Randomness
    summary: Implement and prove how to make stochastic evidence exactly replayable.
  es:
    title: Aleatoriedad reproducible
    summary: Implementa y demuestra cómo hacer que la evidencia estocástica sea reproducible.
hints:
- Read the visible assertion, then identify how to make stochastic evidence exactly replayable; inspect
  `pin_random_seed` as a naming clue.
- The target behavior is represented by one explicit operation near `pin_random_seed`.
- Replay the latency profile and inspect its required recovery operation.
execution:
