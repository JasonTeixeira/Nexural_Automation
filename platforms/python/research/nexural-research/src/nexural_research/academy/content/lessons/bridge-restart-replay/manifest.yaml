id: bridge.restart-replay
track: bridge-engineer
title: Restart Replay
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to replay the durable log without duplicating effects.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- bridge.account-isolation
tags:
- executable
- paper-only
- duplicate
translations:
  en:
    title: Restart Replay
    summary: Implement and prove how to replay the durable log without duplicating effects.
  es:
    title: Replay tras reinicio
    summary: Implementa y demuestra cómo reproducir el log durable sin duplicar efectos.
hints:
- Read the visible assertion, then identify how to replay the durable log without duplicating effects;
  inspect `replay_unacked_events` as a naming clue.
- The target behavior is represented by one explicit operation near `replay_unacked_events`.
- Replay the duplicate profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - duplicate
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `replay_unacked_events`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.duplicate.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded duplicate scenario.
