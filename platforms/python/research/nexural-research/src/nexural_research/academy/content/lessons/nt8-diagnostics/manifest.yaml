id: nt8.diagnostics
track: nt8-foundations
title: TraceOrders and Diagnostics
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to emit bounded diagnostic context for every order transition.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- nt8.playback
tags:
- executable
- paper-only
- duplicate
translations:
  en:
    title: TraceOrders and Diagnostics
    summary: Implement and prove how to emit bounded diagnostic context for every order transition.
  es:
    title: TraceOrders y diagnóstico
    summary: Implementa y demuestra cómo emitir contexto diagnóstico acotado para cada transición de orden.
hints:
- Read the visible assertion, then identify how to emit bounded diagnostic context for every order transition;
  inspect `emit_structured_diagnostics` as a naming clue.
- The target behavior is represented by one explicit operation near `emit_structured_diagnostics`.
- Replay the duplicate profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - duplicate
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `emit_structured_diagnostics`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.duplicate.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded duplicate scenario.
