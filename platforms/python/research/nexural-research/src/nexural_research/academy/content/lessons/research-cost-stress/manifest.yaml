id: research.cost_stress
track: research-operator
title: Execution Cost Stress
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to recompute evidence across commissions, spread, and slippage.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- research.walk_forward
tags:
- executable
- paper-only
- partial_fill
translations:
  en:
    title: Execution Cost Stress
    summary: Implement and prove how to recompute evidence across commissions, spread, and slippage.
  es:
    title: Estrés de costes de ejecución
    summary: Implementa y demuestra cómo recalcular evidencia con comisiones, spread y slippage.
hints:
- Read the visible assertion, then identify how to recompute evidence across commissions, spread, and
  slippage; inspect `apply_cost_scenarios` as a naming clue.
- The target behavior is represented by one explicit operation near `apply_cost_scenarios`.
- Replay the partial_fill profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - partial_fill
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `apply_cost_scenarios`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.partial_fill.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded partial_fill scenario.
