id: nt8.calculate-modes
track: nt8-foundations
title: Calculate Modes
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to choose OnBarClose, OnEachTick, or OnPriceChange deliberately.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- nt8.lifecycle
tags:
- executable
- paper-only
- latency
translations:
  en:
    title: Calculate Modes
    summary: Implement and prove how to choose OnBarClose, OnEachTick, or OnPriceChange deliberately.
  es:
    title: Modos de cálculo
    summary: Implementa y demuestra cómo elegir OnBarClose, OnEachTick u OnPriceChange de forma deliberada.
hints:
- Read the visible assertion, then identify how to choose OnBarClose, OnEachTick, or OnPriceChange deliberately;
  inspect `select_calculate_mode` as a naming clue.
- The target behavior is represented by one explicit operation near `select_calculate_mode`.
- Replay the latency profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - latency
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `select_calculate_mode`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.latency.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded latency scenario.
