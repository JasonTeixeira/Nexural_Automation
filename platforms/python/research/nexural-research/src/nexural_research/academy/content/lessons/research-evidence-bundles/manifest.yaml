id: research.evidence-bundles
track: research-operator
title: Reproducible Evidence Bundles
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to bind code, data, parameters, folds, and artifacts by hash.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- research.monte-carlo
tags:
- executable
- paper-only
- disconnect
translations:
  en:
    title: Reproducible Evidence Bundles
    summary: Implement and prove how to bind code, data, parameters, folds, and artifacts by hash.
  es:
    title: Paquetes de evidencia reproducible
    summary: Implementa y demuestra cómo vincular código, datos, parámetros, folds y artefactos por hash.
hints:
- Read the visible assertion, then identify how to bind code, data, parameters, folds, and artifacts by
  hash; inspect `seal_evidence_bundle` as a naming clue.
- The target behavior is represented by one explicit operation near `seal_evidence_bundle`.
- Replay the disconnect profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - disconnect
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `seal_evidence_bundle`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.disconnect.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded disconnect scenario.
