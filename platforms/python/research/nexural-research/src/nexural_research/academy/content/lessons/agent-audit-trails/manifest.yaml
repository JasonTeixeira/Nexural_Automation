id: agent.audit-trails
track: agent-automation-engineer
title: Tamper-Evident Audit Trails
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to detect missing or modified automation records.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- agent.timeout-budget
tags:
- executable
- paper-only
- duplicate
translations:
  en:
    title: Tamper-Evident Audit Trails
    summary: Implement and prove how to detect missing or modified automation records.
  es:
    title: Auditoría a prueba de manipulación
    summary: Implementa y demuestra cómo detectar registros ausentes o modificados.
hints:
- Read the visible assertion, then identify how to detect missing or modified automation records; inspect
  `chain_audit_records` as a naming clue.
- The target behavior is represented by one explicit operation near `chain_audit_records`.
- Replay the duplicate profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - duplicate
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `chain_audit_records`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.duplicate.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded duplicate scenario.
