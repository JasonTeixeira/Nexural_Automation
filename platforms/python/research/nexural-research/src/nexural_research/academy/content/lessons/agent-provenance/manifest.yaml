id: agent.provenance
track: agent-automation-engineer
title: Data Provenance
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to bind every material claim to source and retrieval time.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- agent.secrets
tags:
- executable
- paper-only
- stale_data
translations:
  en:
    title: Data Provenance
    summary: Implement and prove how to bind every material claim to source and retrieval time.
  es:
    title: Procedencia de datos
    summary: Implementa y demuestra cómo vincular cada afirmación a fuente y hora.
hints:
- Read the visible assertion, then identify how to bind every material claim to source and retrieval time;
  inspect `attach_source_provenance` as a naming clue.
- The target behavior is represented by one explicit operation near `attach_source_provenance`.
- Replay the stale_data profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - stale_data
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `attach_source_provenance`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.stale_data.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded stale_data scenario.
