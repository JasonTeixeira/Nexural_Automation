id: nt8.resource-cleanup
track: nt8-foundations
title: Indicator Resource Cleanup
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to release runtime resources in the correct termination state.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- nt8.parameters
tags:
- executable
- paper-only
- disconnect
translations:
  en:
    title: Indicator Resource Cleanup
    summary: Implement and prove how to release runtime resources in the correct termination state.
  es:
    title: Liberación de recursos del indicador
    summary: Implementa y demuestra cómo liberar recursos en el estado de terminación correcto.
hints:
- Read the visible assertion, then identify how to release runtime resources in the correct termination
  state; inspect `dispose_runtime_resources` as a naming clue.
- The target behavior is represented by one explicit operation near `dispose_runtime_resources`.
- Replay the disconnect profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - disconnect
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `dispose_runtime_resources`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.disconnect.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded disconnect scenario.
