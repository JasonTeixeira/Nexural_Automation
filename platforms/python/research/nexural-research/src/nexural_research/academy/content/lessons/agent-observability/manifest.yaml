id: agent.observability
track: agent-automation-engineer
title: Agent Observability
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to record decisions, tools, inputs, and bounded outputs.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- agent.prompt_injection
tags:
- executable
- paper-only
- latency
translations:
  en:
    title: Agent Observability
    summary: Implement and prove how to record decisions, tools, inputs, and bounded outputs.
  es:
    title: Observabilidad de agentes
    summary: Implementa y demuestra cómo registrar decisiones, herramientas, entradas y salidas acotadas.
hints:
- Read the visible assertion, then identify how to record decisions, tools, inputs, and bounded outputs;
  inspect `emit_agent_trace` as a naming clue.
- The target behavior is represented by one explicit operation near `emit_agent_trace`.
- Replay the latency profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - latency
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `emit_agent_trace`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.latency.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded latency scenario.
