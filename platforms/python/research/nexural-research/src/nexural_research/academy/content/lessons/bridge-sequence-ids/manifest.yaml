id: bridge.sequence-ids
track: bridge-engineer
title: Monotonic Sequence IDs
updated_at: '2026-07-19'
estimated_minutes: 50
objectives:
- Explain how to detect gaps, reordering, and replay.
- Produce a deterministic trace and fault-evidence artifact.
prerequisites:
- bridge.kill_switch
tags:
- executable
- paper-only
- latency
translations:
  en:
    title: Monotonic Sequence IDs
    summary: Implement and prove how to detect gaps, reordering, and replay.
  es:
    title: IDs de secuencia monótonos
    summary: Implementa y demuestra cómo detectar huecos, reordenamiento y repetición.
hints:
- Read the visible assertion, then identify how to detect gaps, reordering, and replay; inspect `enforce_monotonic_sequence`
  as a naming clue.
- The target behavior is represented by one explicit operation near `enforce_monotonic_sequence`.
- Replay the latency profile and inspect its required recovery operation.
execution:
  runner: nexural.declarative-trace.v1
  starter: starter/program.yaml
  visible_tests: tests/visible.yaml
  hidden_tests: tests/hidden.yaml
  solution: solution/program.yaml
  expected_trace: expected-trace.json
  fault_profiles:
  - latency
rubric:
- id: trace-complete
  metric: tests.trace-complete.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: Replace every TODO so the trusted runner can complete the trace.
- id: target-behavior
  metric: tests.target-behavior.passed
  operator: equals
  expected: true
  weight: 25
  visibility: public
  message: The trace must implement `enforce_monotonic_sequence`.
- id: paper-boundary
  metric: tests.paper-boundary.passed
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The hidden safety boundary requires paper-only mode.
- id: fault-resilience
  metric: fault_evidence.latency.handled
  operator: equals
  expected: true
  weight: 25
  visibility: hidden
  message: The implementation did not safely handle the seeded latency scenario.
