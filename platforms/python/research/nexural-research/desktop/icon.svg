<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Equity curve line -->
  <polyline points="80,380 140,350 200,370 260,280 320,300 380,200 432,160"
    fill="none" stroke="url(#line)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
  <!-- N letter -->
  <text x="256" y="320" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="260" fill="white">N</text>
</svg>
