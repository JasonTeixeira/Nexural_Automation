name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test
        run: |
          pip install -e ".[dev,mcp]"
          python -m nexural_research.cli quality-gate --threshold 0.95 --json --fast
          pytest tests/ --ignore=tests/e2e --tb=short -q

      - name: Build Docker image
        run: |
          docker build -t nexural-research:${{ github.ref_name }} .
          docker tag nexural-research:${{ github.ref_name }} nexural-research:latest

      - name: Generate SBOM (SPDX-JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: ${{ github.workspace }}/sbom.spdx.json
          artifact-name: sbom.spdx.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          files: |
            ${{ github.workspace }}/sbom.spdx.json
