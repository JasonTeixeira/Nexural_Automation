name: Nexural Research CI

on:
  pull_request:
    paths:
      - "platforms/python/research/nexural-research/**"
      - ".github/workflows/python-research-ci.yml"
      - "platforms/python/research/examples/**"
  push:
    branches: [ main ]
    paths:
      - "platforms/python/research/nexural-research/**"
      - ".github/workflows/python-research-ci.yml"
      - "platforms/python/research/examples/**"

  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev,mcp]"
      - name: Lint public MVP surface
        env:
          PYTHONPATH: src
        run: python -m ruff check src/nexural_research/automation.py src/nexural_research/mcp_server.py src/nexural_research/mcp_hosts.py src/nexural_research/cost_model.py src/nexural_research/gauntlet.py src/nexural_research/strategy_sdk.py src/nexural_research/bridge_sdk.py src/nexural_research/contracts.py src/nexural_research/quality_gate.py src/nexural_research/api/routers/automation.py tests/test_automation.py tests/test_api.py tests/test_mcp_contract.py
      - name: Format check
        run: ruff format --check src/nexural_research/automation.py src/nexural_research/mcp_server.py src/nexural_research/mcp_hosts.py src/nexural_research/cost_model.py src/nexural_research/gauntlet.py src/nexural_research/strategy_sdk.py src/nexural_research/bridge_sdk.py src/nexural_research/contracts.py src/nexural_research/quality_gate.py src/nexural_research/api/routers/automation.py tests/test_automation.py tests/test_api.py tests/test_mcp_contract.py

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]" mypy
      - name: Type check
        run: mypy src/nexural_research/ --ignore-missing-imports --no-strict-optional || true

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install security tools
        run: pip install bandit pip-audit
      - name: Bandit security scan
        run: bandit -r src/ -ll -ii
      - name: Dependency audit
        run: pip-audit -r requirements/py311-ci-lock.txt

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan tracked files for committed secrets
        run: python scripts/repo-tools/secret_scan.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --tb=short --cov=nexural_research --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: platforms/python/research/nexural-research/coverage.xml

  public-mvp-quality-gate:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install public MVP dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"
      - name: Run public MVP quality gate
        shell: bash
        env:
          SETUPTOOLS_USE_DISTUTILS: stdlib
          PYTHONPATH: src
        run: python -m nexural_research.cli quality-gate --threshold 0.95 --json --fast

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research/frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platforms/python/research/nexural-research/frontend/package-lock.json
      - name: Install
        run: npm ci || npm install
      - name: Dependency audit
        run: npm audit --audit-level=moderate
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research
    steps:
      - uses: actions/checkout@v6
      - name: Build Docker image
        run: docker build -t nexural-research:ci .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nexural-research:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Smoke test
        run: |
          docker run -d --name nexural-ci -p 8000:8000 nexural-research:ci
          sleep 5
          curl -f http://localhost:8000/api/health || exit 1
          docker stop nexural-ci
