name: python-research-ci

on:
  pull_request:
    paths:
      - "platforms/python/research/nexural-research/**"
      - ".github/workflows/python-research-ci.yml"
  push:
    branches: [ main ]
    paths:
      - "platforms/python/research/nexural-research/**"
      - ".github/workflows/python-research-ci.yml"

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platforms/python/research/nexural-research
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scipy scikit-learn statsmodels
          pip install fastapi "uvicorn[standard]" python-multipart httpx
          pip install plotly duckdb pyarrow pydantic pyyaml rich
          pip install pytest ruff
          pip install --no-deps -e .

      - name: Lint (ruff)
        run: ruff check src/ tests/ --select E,F,W --ignore E501

      - name: Tests (pytest)
        run: pytest tests/ -v --tb=short
