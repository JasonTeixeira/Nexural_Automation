name: Release Please

on:
  push:
    branches: [main]

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@8b8fd2cc23b2e18957157a9d923d75aa0c6f6ad5 # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Dispatch the immutable release gate
        if: ${{ steps.release.outputs['platforms/python/research/nexural-research--release_created'] == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs['platforms/python/research/nexural-research--tag_name'] }}
        run: gh workflow run release.yml --ref main -f tag="$RELEASE_TAG"
