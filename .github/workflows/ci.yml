name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python 3.11 release gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platforms/python/research/nexural-research

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.11
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Public MVP quality gate
        env:
          SETUPTOOLS_USE_DISTUTILS: stdlib
          PYTHONPATH: src
        run: python -m nexural_research.cli quality-gate --threshold 0.95 --json --fast

      - name: Run tests
        run: pytest tests/ --ignore=tests/e2e -v --tb=short

      - name: Execute documentation smoke contracts
        working-directory: .
        env:
          SETUPTOOLS_USE_DISTUTILS: stdlib
        run: python scripts/docs_smoke.py

  test-frontend:
    name: Frontend TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platforms/python/research/nexural-research/frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platforms/python/research/nexural-research/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build

  test-e2e:
    name: Browser, auth, and accessibility release gate
    needs: [test-python, test-frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platforms/python/research/nexural-research/frontend/package-lock.json

      - name: Install Python and frontend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "platforms/python/research/nexural-research[dev,mcp]" playwright
          npm ci --prefix platforms/python/research/nexural-research/frontend
          npx --prefix platforms/python/research/nexural-research/frontend playwright install --with-deps chromium

      - name: Build canonical frontend
        run: npm run build --prefix platforms/python/research/nexural-research/frontend

      - name: Start public and authenticated API instances
        working-directory: platforms/python/research/nexural-research
        run: |
          PYTHONPATH=src nohup python -m uvicorn nexural_research.api.app:app --host 127.0.0.1 --port 8011 >/tmp/nexural-public.log 2>&1 &
          NEXURAL_AUTH_ENABLED=true NEXURAL_API_KEYS=e2e-academy-key NEXURAL_ACADEMY_STATE_DIR=/tmp/nexural-auth-state PYTHONPATH=src nohup python -m uvicorn nexural_research.api.app:app --host 127.0.0.1 --port 8012 >/tmp/nexural-auth.log 2>&1 &
          for port in 8011 8012; do
            for attempt in {1..30}; do
              curl --fail --silent "http://127.0.0.1:${port}/api/health" && break
              sleep 1
            done
          done

      - name: Run canonical Python browser workflows
        working-directory: platforms/python/research/nexural-research
        env:
          E2E_FRONTEND_URL: http://127.0.0.1:8011
          PYTHONPATH: src
        run: pytest tests/e2e -v --tb=short

      - name: Run four-width Axe and hosted-auth workflows
        working-directory: platforms/python/research/nexural-research/frontend
        env:
          E2E_FRONTEND_URL: http://127.0.0.1:8011
          E2E_AUTH_URL: http://127.0.0.1:8012
        run: npm run test:e2e
