name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python 3.11 release gate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platforms/python/research/nexural-research

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Public MVP quality gate
        env:
          SETUPTOOLS_USE_DISTUTILS: stdlib
          PYTHONPATH: src
        run: python -m nexural_research.cli quality-gate --threshold 0.95 --json --fast

      - name: Run tests
        run: pytest tests/ --ignore=tests/e2e -v --tb=short

  test-frontend:
    name: Frontend TypeScript
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: platforms/python/research/nexural-research/frontend

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: platforms/python/research/nexural-research/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npx vite build
