name: World-class qualification

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  qualification:
    name: Automated qualification evidence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            platforms/python/research/nexural-research/frontend/package-lock.json
            platforms/python/research/nexural-research/desktop/package-lock.json

      - name: Install validation and security tools
        run: python -m pip install jsonschema bandit pip-audit

      - name: Enforce the no-new-strategy cycle
        if: github.event_name == 'pull_request'
        run: python scripts/repo-tools/enforce_no_new_strategies.py --base "${{ github.event.pull_request.base.sha }}" --head "${{ github.event.pull_request.head.sha }}"

      - name: Run portable fault, property, fuzz, mutation, and RTO gates
        shell: pwsh
        run: |
          ./platforms/ninjatrader/scripts/Test-NT8SafetySpine.ps1 -SkipNativeCompile
          ./platforms/ninjatrader/scripts/Test-NT8Adversarial.ps1 `
            -OutputDirectory '${{ github.workspace }}/artifacts/qualification'

      - name: Scan Python source and locked dependencies
        run: |
          bandit -r platforms/python/research/nexural-research/src -ll -ii
          pip-audit -r platforms/python/research/nexural-research/requirements/py311-ci-lock.txt
          pip-audit -r platforms/python/research/nexural-research/requirements-dev.lock.txt

      - name: Audit every supported JavaScript dependency tree
        run: |
          npm ci --ignore-scripts --prefix platforms/python/research/nexural-research/frontend
          npm audit --audit-level=high --prefix platforms/python/research/nexural-research/frontend
          npm ci --ignore-scripts --prefix platforms/python/research/nexural-research/desktop
          npm audit --audit-level=high --prefix platforms/python/research/nexural-research/desktop

      - name: Build the production container
        run: docker build -t nexural-research:qualification platforms/python/research/nexural-research

      - name: Reject every HIGH or CRITICAL container vulnerability
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: nexural-research:qualification
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: 1

      - name: Generate and validate the current qualification report
        env:
          TESTED_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
          WORKFLOW_RUN: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          mkdir -p qualification/evidence/automation artifacts/qualification
          python scripts/repo-tools/generate_automation_evidence.py \
            --adversarial artifacts/qualification/adversarial.json \
            --mutations artifacts/qualification/mutations.json \
            --commit "$TESTED_COMMIT" \
            --workflow-run "$WORKFLOW_RUN" \
            --output qualification/evidence/automation/ci.json
          python scripts/repo-tools/verify_world_class_gate.py \
            --commit "$TESTED_COMMIT" \
            --format markdown \
            --output artifacts/qualification/world-class-report.md
          cp qualification/evidence/automation/ci.json artifacts/qualification/automation.json

      - name: Upload machine-readable qualification evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: world-class-qualification-evidence
          path: artifacts/qualification/*
          if-no-files-found: error
