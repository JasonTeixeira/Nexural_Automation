name: docs-and-metadata

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Link check (README + docs)
        uses: lycheeverse/lychee-action@2b973e86fc7b1f6b36a93795fe2c9c6ae1118621 # v1
        with:
          # Check markdown files for links. Keep it light early on.
          args: >-
            --verbose
            --no-progress
            --accept 200,204,206,301,302,303,307,308
            --exclude-mail
            --max-concurrency 8
            "**/*.md"

  metadata-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate metadata.yaml presence for modules
        shell: bash
        run: |
          set -euo pipefail
          echo "Scanning for module folders..."

          # A module folder is any directory containing metadata.yaml.
          # For now we only assert that any module folder has required companion files.
          # This prevents half-finished module PRs.

          missing=0
          while IFS= read -r meta; do
            dir=$(dirname "$meta")
            for f in README.md parameters.md notes.md changelog.md; do
              if [ ! -f "$dir/$f" ]; then
                echo "Missing $f in $dir"
                missing=1
              fi
            done
            for d in src screenshots test-results; do
              if [ ! -d "$dir/$d" ]; then
                echo "Missing directory $d in $dir"
                missing=1
              fi
            done
          done < <(find platforms templates -name metadata.yaml -type f 2>/dev/null || true)

          if [ "$missing" -ne 0 ]; then
            echo "Metadata validation failed."
            exit 1
          fi

          echo "Metadata validation passed."

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install schema validators
        run: python -m pip install jsonschema pyyaml

      - name: Validate strategy and bridge schemas
        run: python scripts/repo-tools/validate_contract_schemas.py

      - name: Validate external beta evidence
        run: python scripts/repo-tools/validate_beta_evidence.py
