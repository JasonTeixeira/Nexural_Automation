name: module-catalog

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  module-catalog-up-to-date:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Regenerate MODULES.md
        run: |
          python scripts/repo-tools/generate_module_catalog.py --out MODULES.md

      - name: Ensure MODULES.md is committed
        run: |
          git diff --exit-code MODULES.md
