name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "schemas/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: pages
        name: Check whether GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.getPages(context.repo);
              core.setOutput("enabled", "true");
            } catch (error) {
              if (error.status === 404) {
                core.notice("GitHub Pages is not enabled for this repository. Skipping deploy.");
                core.setOutput("enabled", "false");
              } else {
                throw error;
              }
            }
      - uses: actions/configure-pages@v5
        if: steps.pages.outputs.enabled == 'true'
        with:
          enablement: false
      - uses: actions/upload-pages-artifact@v3
        if: steps.pages.outputs.enabled == 'true'
        with:
          path: docs
      - id: deployment
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/deploy-pages@v4
